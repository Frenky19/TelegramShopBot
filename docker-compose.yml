services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  admin-panel:
    build:
      context: ./admin-panel
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python manage.py migrate && python scripts/create_superuser.py && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - admin_media:/app/media
      - ./admin-panel/logs:/app/logs

  telegram-bot:
    build:
      context: ./telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      admin-panel:
        condition: service_started
    command: python -m app.main
    volumes:
      - ./telegram-bot/app:/app/app
      - ./telegram-bot/logs:/app/logs

  webapp:
    build:
      context: ./webapp
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      admin-panel:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  admin_media:
